<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>可乐论坛</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333}
.nav{background:#1a1a2e;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.nav-left{display:flex;align-items:center;gap:12px}
.nav-logo{font-size:28px}
.nav-title{color:#fff;font-size:20px;font-weight:bold}
.nav-title span{color:#ff6b35}
.nav-right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;border:none}
.btn-primary{background:#ff6b35;color:#fff}
.btn-primary:hover{background:#ff8c5a}
.btn-outline{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3)}
.btn-outline:hover{border-color:#ff6b35;color:#ff6b35}
.btn-danger{background:#e74c3c;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
.container{max-width:800px;margin:0 auto;padding:16px}
.search-bar{display:flex;gap:8px;margin-bottom:16px}
.search-bar input{flex:1;padding:10px 14px;border:2px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none}
.search-bar input:focus{border-color:#ff6b35}
.post-card{background:#fff;padding:14px 18px;border-radius:10px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer}
.post-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);border-left:3px solid #ff6b35}
.post-title{font-size:16px;font-weight:600;margin-bottom:6px;color:#1a1a2e}
.post-meta{font-size:12px;color:#999;display:flex;gap:12px;flex-wrap:wrap}
.pagination{display:flex;justify-content:center;gap:4px;margin-top:16px;flex-wrap:wrap}
.page-btn{padding:6px 12px;border:1px solid #ddd;border-radius:4px;cursor:pointer;background:#fff;font-size:13px}
.page-btn.active{background:#ff6b35;color:#fff;border-color:#ff6b35}
.page-btn:disabled{opacity:.4;cursor:not-allowed}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;justify-content:center;align-items:center}
.modal.show{display:flex}
.modal-content{background:#fff;padding:24px;border-radius:12px;width:92%;max-width:500px;max-height:85vh;overflow-y:auto}
.modal-title{font-size:18px;font-weight:700;margin-bottom:16px}
.form-group{margin-bottom:12px}
.form-group label{display:block;margin-bottom:4px;font-size:13px;color:#555;font-weight:500}
.form-group input,.form-group textarea{width:100%;padding:8px 12px;border:2px solid #e0e0e0;border-radius:6px;font-size:14px;font-family:inherit;outline:none}
.form-group input:focus,.form-group textarea:focus{border-color:#ff6b35}
.form-group textarea{min-height:100px;resize:vertical}
.modal-footer{display:flex;gap:8px;margin-top:16px}
.modal-footer .btn{flex:1;text-align:center}
.user-info{display:flex;align-items:center;gap:8px}
.avatar{width:30px;height:30px;border-radius:50%;background:#ff6b35;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:bold;background-size:cover}
.avatar-img{width:30px;height:30px;border-radius:50%;object-fit:cover}
.user-name{color:#fff;font-size:13px}
.toast-container{position:fixed;top:16px;right:16px;z-index:2000}
.toast{padding:10px 20px;border-radius:8px;color:#fff;font-size:13px;margin-bottom:6px;box-shadow:0 4px 12px rgba(0,0,0,.15)}
.toast.success{background:#52c41a}
.toast.error{background:#ff4d4f}
.loading{text-align:center;padding:40px;color:#999}
.empty-state{text-align:center;padding:40px;color:#999}
.empty-icon{font-size:48px;margin-bottom:12px}
.post-detail-body{line-height:1.8;font-size:15px;white-space:pre-wrap;padding:12px 0;border-top:1px solid #eee;border-bottom:1px solid #eee;margin-bottom:12px}
.post-actions{display:flex;gap:12px;margin-bottom:12px}
.post-actions button{padding:6px 14px;border:1px solid #ddd;border-radius:20px;cursor:pointer;background:#fff;font-size:13px}
.post-actions button:hover{border-color:#ff6b35;color:#ff6b35}
.comment-item{padding:10px 14px;background:#f8f9fa;border-radius:8px;margin-bottom:6px}
.comment-header{display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px}
.comment-author{font-weight:600}
.comment-time{color:#999}
.user-menu{position:relative}
.user-dropdown{display:none;position:absolute;top:100%;right:0;background:#fff;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:8px;min-width:150px;z-index:200}
.user-dropdown.show{display:block}
.user-dropdown a{display:block;padding:8px 12px;color:#333;text-decoration:none;font-size:13px;border-radius:4px;cursor:pointer}
.user-dropdown a:hover{background:#f5f5f5}
.hero{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);border-radius:16px;padding:32px 28px;margin-bottom:20px;text-align:center;border:1px solid #2a2a5e;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.hero-emoji{font-size:56px;display:block;margin-bottom:8px}
.hero-title{font-size:28px;font-weight:800;color:#fff;margin-bottom:6px}
.hero-title span{color:#ff6b35}
.hero-desc{font-size:14px;color:#8899aa;margin-bottom:20px;line-height:1.6}
.hero-stats{display:flex;justify-content:center;align-items:center;background:rgba(255,255,255,.05);border-radius:12px;padding:16px 20px;max-width:480px;margin:0 auto}
.hero-stat{flex:1;display:flex;align-items:center;justify-content:center;gap:12px}
.hero-stat-label{font-size:14px;color:#ccc}
.hero-stat-divider{width:1px;height:32px;background:#2a2a5e;margin:0 16px}
.hero-stat-num{font-size:26px;font-weight:800;color:#ff6b35}
.hero-feedback{margin-top:14px}
.hero-feedback .btn{background:transparent;border:1px solid #ff6b35;color:#ff6b35;padding:6px 20px;font-size:13px;border-radius:20px}
.hero-feedback .btn:hover{background:#ff6b35;color:#fff}
@media(max-width:600px){.nav{padding:10px 12px}.nav-title{font-size:16px}.container{padding:10px}.modal-content{width:96%;padding:16px}.hero{padding:24px 18px}.hero-emoji{font-size:40px}.hero-title{font-size:22px}.hero-stats{padding:12px 8px}.hero-stat-num{font-size:20px}}
</style>
</head>
<body>
<nav class="nav"><div class="nav-left"><span class="nav-logo">🥤</span><div class="nav-title">可乐<span>论坛</span></div></div>
<div class="nav-right">
<button class="btn btn-outline btn-sm" onclick="showSearch()">🔍</button>
<button class="btn btn-outline btn-sm" onclick="showLogin()" id="loginBtn">登录</button>
<button class="btn btn-primary btn-sm" onclick="showCreatePost()" id="postBtn" style="display:none">+ 发帖</button>
<div id="userInfo" style="display:none" class="user-info user-menu">
<div onclick="toggleMenu()" style="display:flex;align-items:center;gap:6px;cursor:pointer">
<img id="avatarEl" class="avatar-img" src="" style="display:none">
<div id="avatarLetter" class="avatar">可</div><span class="user-name" id="nameEl"></span></div>
<div class="user-dropdown" id="userDropdown">
<a onclick="showProfile()">👤 个人资料</a>
<a onclick="showFavorites()">⭐ 我的收藏</a>
<a onclick="window.open('https://api.kele233.cc.cd/admin','_blank')">⚙️ 管理后台</a>
<a onclick="logout()">🚪 退出</a>
</div></div></div></nav>

<div class="container" id="mainContainer">
<div class="hero">
<span class="hero-emoji">🥤</span>
<div class="hero-title">可乐<span>论坛</span></div>
<div class="hero-desc">一个简单、自由的交流社区<br>分享你的想法，遇见有趣的灵魂</div>
<div class="hero-stats">
<div class="hero-stat"><span class="hero-stat-label">👥 用户</span><span class="hero-stat-divider"></span><span class="hero-stat-num" id="statUsers">0</span></div>
<div class="hero-stat-divider"></div>
<div class="hero-stat"><span class="hero-stat-label">📝 帖子</span><span class="hero-stat-divider"></span><span class="hero-stat-num" id="statPosts">0</span></div>
</div>
<div class="hero-feedback"><button class="btn" onclick="var m=prompt('请描述您的问题或建议：');if(m){fetch('https://api.kele233.cc.cd/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:m})}).then(r=>r.json()).then(d=>alert(d.message)).catch(()=>alert('提交失败'))}">💬 反馈建议</button>
</div>

<div class="search-bar" id="searchBar" style="display:none">
<input type="text" id="searchInput" placeholder="搜索帖子..." onkeydown="if(event.key==='Enter')doSearch()">
<button class="btn btn-primary" onclick="doSearch()">搜索</button>
<button class="btn btn-outline" onclick="cancelSearch()" style="color:#666;border-color:#ddd">取消</button></div>
<div id="postList"><div class="loading">加载中...</div></div>
<div class="pagination" id="pagination"></div></div>

<div id="toastContainer"></div>

<div class="modal" id="loginModal"><div class="modal-content">
<div class="modal-title" id="loginTitle">🥤 登录</div>
<div class="form-group"><label>邮箱</label><input type="email" id="loginEmail" placeholder="输入邮箱"></div>
<div class="form-group" id="regNickGroup" style="display:none"><label>昵称</label><input type="text" id="regNick" placeholder="输入昵称"></div>
<p id="switchText" style="text-align:center;font-size:13px;color:#999;margin-bottom:12px">没有账号？<a href="#" onclick="switchAuthMode()">去注册</a></p>
<div class="modal-footer">
<button class="btn btn-primary" onclick="submitAuth()" id="authBtn">🚀 登录</button>
<button class="btn btn-outline" onclick="closeModal('loginModal')" style="color:#666;border-color:#ddd">取消</button></div></div></div>

<div class="modal" id="postModal"><div class="modal-content">
<div class="modal-title">📝 发帖</div>
<div class="form-group"><label>标题</label><input type="text" id="titleInput" placeholder="标题"></div>
<div class="form-group"><label>内容</label><textarea id="contentInput" placeholder="写点什么..."></textarea></div>
<div class="modal-footer">
<button class="btn btn-primary" onclick="createPost()">🚀 发布</button>
<button class="btn btn-outline" onclick="closeModal('postModal')" style="color:#666;border-color:#ddd">取消</button></div></div></div>

<div class="modal" id="detailModal"><div class="modal-content">
<div class="modal-title" id="detailTitle">帖子</div>
<div id="detailContent"></div>
<div class="post-actions" id="postActions"></div>
<div style="margin-top:12px"><h4 style="font-size:14px;margin-bottom:8px">💬 评论 (<span id="commentCount">0</span>)</h4>
<div id="commentList"></div>
<div style="margin-top:8px"><textarea id="commentInput" rows="2" placeholder="写评论..." style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:13px"></textarea>
<button class="btn btn-primary btn-sm" onclick="addComment()" style="margin-top:6px">发表</button></div></div>
<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('detailModal')" style="flex:1;color:#666;border-color:#ddd">关闭</button></div></div></div>

<div class="modal" id="profileModal"><div class="modal-content">
<div class="modal-title">👤 个人资料</div>
<div style="text-align:center;margin-bottom:16px">
<img id="profileAvatar" class="avatar-img" style="width:80px;height:80px;border-radius:50%;display:none;margin:0 auto">
<div id="profileAvatarLetter" style="width:80px;height:80px;border-radius:50%;background:#ff6b35;color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto">可</div><br>
<button class="btn btn-outline btn-sm" onclick="document.getElementById('avatarInput').click()" style="margin-top:8px;color:#666;border-color:#ddd">📷 上传头像</button>
<input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)"></div>
<div class="form-group"><label>昵称</label><input type="text" id="profileNickInput"></div>
<div class="form-group"><label>邮箱</label><input type="text" id="profileEmail" disabled style="background:#f5f5f5"></div>
<div class="modal-footer">
<button class="btn btn-primary" onclick="updateProfile()">💾 保存</button>
<button class="btn btn-outline" onclick="closeModal('profileModal')" style="flex:1;color:#666;border-color:#ddd">关闭</button></div></div></div>

<div class="modal" id="favoritesModal"><div class="modal-content">
<div class="modal-title">⭐ 我的收藏</div>
<div id="favoritesList"><div class="loading">加载中...</div></div>
<div class="modal-footer"><button class="btn btn-outline" onclick="closeModal('favoritesModal')" style="flex:1;color:#666;border-color:#ddd">关闭</button></div></div></div>

<script>
const API='https://api.kele233.cc.cd';let user=null,page=1,isReg=false,cpid=null,sq=''
function toast(m,t){const e=document.createElement('div');e.className='toast '+t;e.textContent=m;document.getElementById('toastContainer').appendChild(e);setTimeout(()=>{e.style.opacity='0';setTimeout(()=>e.remove(),300)},2500)}
function showModal(i){document.getElementById(i).classList.add('show')}
function closeModal(i){document.getElementById(i).classList.remove('show')}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML}
function timeAgo(ts){if(!ts)return'刚刚';const d=new Date(ts),df=Date.now()-d.getTime();if(df<6e4)return'刚刚';if(df<36e5)return Math.floor(df/6e4)+'分钟前';if(df<864e5)return Math.floor(df/36e5)+'小时前';return Math.floor(df/864e5)+'天前'}
function toggleMenu(){document.getElementById('userDropdown').classList.toggle('show')}
document.addEventListener('click',function(e){if(!e.target.closest('.user-menu'))document.getElementById('userDropdown').classList.remove('show')})
async function api(p,o={}){const r=await fetch(API+p,{...o,headers:{'Content-Type':'application/json',...o.headers},credentials:'include'});const d=await r.json();if(!r.ok)throw new Error(d.error||'请求失败');return d}
function showSearch(){document.getElementById('searchBar').style.display='flex';document.getElementById('searchInput').focus()}
function doSearch(){sq=document.getElementById('searchInput').value.trim();page=1;loadPosts()}
function cancelSearch(){sq='';document.getElementById('searchInput').value='';document.getElementById('searchBar').style.display='none';page=1;loadPosts()}
function showLogin(){isReg=false;document.getElementById('loginTitle').textContent='🥤 登录';document.getElementById('regNickGroup').style.display='none';document.getElementById('switchText').innerHTML='没有账号？<a href="#" onclick="switchAuthMode()">去注册</a>';document.getElementById('authBtn').textContent='🚀 登录';document.getElementById('loginEmail').value='';document.getElementById('regNick').value='';showModal('loginModal')}
function switchAuthMode(){isReg=!isReg;if(isReg){document.getElementById('loginTitle').textContent='📝 注册';document.getElementById('regNickGroup').style.display='block';document.getElementById('switchText').innerHTML='已有账号？<a href="#" onclick="switchAuthMode()">去登录</a>';document.getElementById('authBtn').textContent='📝 注册'}else{document.getElementById('loginTitle').textContent='🥤 登录';document.getElementById('regNickGroup').style.display='none';document.getElementById('switchText').innerHTML='没有账号？<a href="#" onclick="switchAuthMode()">去注册</a>';document.getElementById('authBtn').textContent='🚀 登录'}}
async function submitAuth(){const e=document.getElementById('loginEmail').value.trim();document.getElementById('authBtn').disabled=true;document.getElementById('authBtn').textContent='处理中...';try{let d;if(isReg){const n=document.getElementById('regNick').value.trim();if(!e||!n){toast('请填写','error');document.getElementById('authBtn').disabled=false;document.getElementById('authBtn').textContent='📝 注册';return}d=await api('/api/auth/register',{method:'POST',body:JSON.stringify({email:e,nickname:n})});toast('🎉 注册成功！')}else{if(!e){toast('请填写邮箱','error');document.getElementById('authBtn').disabled=false;document.getElementById('authBtn').textContent='🚀 登录';return}d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({email:e})});toast('🎉 欢迎回来！')}user=d.user;renderUser();closeModal('loginModal');loadPosts();loadStats()}catch(e){toast(e.message||'失败','error')}document.getElementById('authBtn').disabled=false;document.getElementById('authBtn').textContent=isReg?'📝 注册':'🚀 登录'}
async function logout(){try{await api('/api/auth/logout',{method:'POST'})}catch(e){}user=null;renderUser();closeModal('profileModal');closeModal('favoritesModal');toast('已退出');document.getElementById('userDropdown').classList.remove('show');loadPosts()}
function renderUser(){const a=document.getElementById('loginBtn'),b=document.getElementById('postBtn'),c=document.getElementById('userInfo');if(user){a.style.display='none';b.style.display='inline-block';c.style.display='flex';document.getElementById('nameEl').textContent=user.nickname||user.username;if(user.avatar){document.getElementById('avatarEl').src=user.avatar.startsWith('data:')?user.avatar:'data:image/jpeg;base64,'+user.avatar;document.getElementById('avatarEl').style.display='block';document.getElementById('avatarLetter').style.display='none'}else{document.getElementById('avatarEl').style.display='none';document.getElementById('avatarLetter').style.display='flex';document.getElementById('avatarLetter').textContent=(user.nickname||'?')[0]}}else{a.style.display='inline-block';b.style.display='none';c.style.display='none'}}
async function fetchUser(){try{const d=await api('/api/auth/me');if(d.user){user=d.user;renderUser()}}catch(e){}}
async function loadStats(){try{const d=await api('/api/stats');document.getElementById('statUsers').textContent=d.users||0;document.getElementById('statPosts').textContent=d.posts||0}catch(e){}}
function showFeedback(){const m=prompt('请描述你遇到的问题或建议：\n（我们会尽快处理，感谢您的反馈！）');if(m){toast('✅ 感谢您的反馈！','success')}}
async function loadPosts(){document.getElementById('postList').innerHTML='<div class="loading">加载中...</div>';try{let u='/api/posts?page='+page;if(sq)u='/api/search?q='+encodeURIComponent(sq)+'&page='+page;const d=await api(u);if(!d.posts||d.posts.length===0){document.getElementById('postList').innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><p>暂无帖子</p></div>'}else{document.getElementById('postList').innerHTML=d.posts.map(p=>'<div class="post-card" onclick="showDetail('+p.id+')"><div class="post-title">'+esc(p.title)+'</div><div class="post-meta"><span>👤 '+esc(p.nickname||'匿名')+'</span><span>🕐 '+timeAgo(p.created_at)+'</span></div></div>').join('')}renderPagination(d.totalPages||1,page)}catch(e){document.getElementById('postList').innerHTML='<div class="empty-state"><div class="empty-icon">😢</div><p>加载失败</p></div>'}}
function renderPagination(t,c){const p=document.getElementById('pagination');if(t<=1){p.innerHTML='';return}let h='<button class="page-btn" onclick="goPage('+(c-1)+')"'+(c<=1?'disabled':'')+'>上一页</button>';for(let i=1;i<=t;i++){if(i===c)h+='<button class="page-btn active">'+i+'</button>';else if(i===1||i===t||Math.abs(i-c)<=2)h+='<button class="page-btn" onclick="goPage('+i+')">'+i+'</button>';else if(!h.endsWith('...'))h+='<button class="page-btn" disabled>...</button>'}h+='<button class="page-btn" onclick="goPage('+(c+1)+')"'+(c>=t?'disabled':'')+'>下一页</button>';p.innerHTML=h}
function goPage(p){page=p;loadPosts()}
function showCreatePost(){if(!user){toast('请先登录','error');return}document.getElementById('titleInput').value='';document.getElementById('contentInput').value='';showModal('postModal')}
async function createPost(){const t=document.getElementById('titleInput').value.trim(),c=document.getElementById('contentInput').value.trim();if(!t||!c){toast('请填写完整','error');return}try{await api('/api/posts',{method:'POST',body:JSON.stringify({title:t,content:c})});toast('发帖成功！');closeModal('postModal');page=1;loadPosts();loadStats()}catch(e){toast(e.message,'error')}}
async function showDetail(id){try{const d=await api('/api/posts/'+id),p=d.post;cpid=p.id;document.getElementById('detailTitle').textContent='📖 '+p.title;let db=user&&user.id===p.author_id?'<button class="btn btn-danger btn-sm" onclick="deletePost('+p.id+')" style="margin-left:8px">🗑️ 删除</button>':'';document.getElementById('detailContent').innerHTML='<div style="color:#999;font-size:13px;margin-bottom:8px">👤 '+esc(p.nickname)+' | 🕐 '+timeAgo(p.created_at)+' '+db+'</div><div class="post-detail-body">'+esc(p.content)+'</div>';document.getElementById('postActions').innerHTML='<button onclick="handleLike('+p.id+',\'like\')">👍 <span id="likeCount">'+(p.likes||0)+'</span></button><button onclick="handleLike('+p.id+',\'dislike\')">👎 <span id="dislikeCount">'+(p.dislikes||0)+'</span></button>'+(user?'<button onclick="handleFavorite('+p.id+')">⭐ 收藏</button>':'');document.getElementById('commentInput').value='';loadComments(p.id);showModal('detailModal')}catch(e){toast('加载失败','error')}}
async function deletePost(id){if(!confirm('确定删除？'))return;try{await api('/api/admin/posts/'+id,{method:'DELETE'});toast('已删除');closeModal('detailModal');loadPosts()}catch(e){toast(e.message,'error')}}
async function loadComments(pid){try{const d=await api('/api/posts/'+pid+'/comments');document.getElementById('commentCount').textContent=(d.comments||[]).length;if(!d.comments||d.comments.length===0)document.getElementById('commentList').innerHTML='<div style="text-align:center;padding:12px;color:#999;font-size:13px">暂无评论</div>';else document.getElementById('commentList').innerHTML=d.comments.map(c=>'<div class="comment-item"><div class="comment-header"><span class="comment-author">👤 '+esc(c.nickname)+'</span><span class="comment-time">'+timeAgo(c.created_at)+'</span></div><div style="font-size:14px">'+esc(c.content)+'</div></div>').join('')}catch(e){}}
async function addComment(){if(!user){toast('请先登录','error');return}const c=document.getElementById('commentInput').value.trim();if(!c){toast('请填写评论','error');return}try{await api('/api/comments',{method:'POST',body:JSON.stringify({post_id:cpid,content:c})});toast('评论成功');document.getElementById('commentInput').value='';loadComments(cpid)}catch(e){toast(e.message,'error')}}
async function handleLike(pid,tp){if(!user){toast('请先登录','error');return}try{await api('/api/posts/'+pid+'/'+tp,{method:'POST'});toast('操作成功')}catch(e){toast(e.message,'error')}}
async function handleFavorite(pid){if(!user){toast('请先登录','error');return}try{const d=await api('/api/posts/'+pid+'/favorite',{method:'POST'});toast(d.message)}catch(e){toast(e.message,'error')}}
function handleAvatarUpload(e){const f=e.target.files[0];if(!f)return;if(f.size>512000){toast('图片不能超过500KB','error');return}const r=new FileReader();r.onload=async function(e){try{const d=await api('/api/avatar',{method:'POST',body:JSON.stringify({avatar:e.target.result})});toast('上传成功');user.avatar=e.target.result;renderUser()}catch(e){toast(e.message,'error')}};r.readAsDataURL(f)}
function showProfile(){if(!user)return;document.getElementById('profileNickInput').value=user.nickname;document.getElementById('profileEmail').value=user.email||'';if(user.avatar){document.getElementById('profileAvatar').src=user.avatar;document.getElementById('profileAvatar').style.display='block';document.getElementById('profileAvatarLetter').style.display='none'}else{document.getElementById('profileAvatar').style.display='none';document.getElementById('profileAvatarLetter').style.display='flex';document.getElementById('profileAvatarLetter').textContent=(user.nickname||'?')[0]}closeModal('detailModal');showModal('profileModal');document.getElementById('userDropdown').classList.remove('show')}
async function updateProfile(){const n=document.getElementById('profileNickInput').value.trim();if(!n){toast('昵称不能为空','error');return}try{await api('/api/profile',{method:'PUT',body:JSON.stringify({nickname:n})});toast('保存成功');user.nickname=n;renderUser()}catch(e){toast(e.message,'error')}}
function showFavorites(){if(!user){toast('请先登录','error');return}document.getElementById('favoritesList').innerHTML='<div class="loading">加载中...</div>';showModal('favoritesModal');loadFavorites()}
async function loadFavorites(){try{const d=await api('/api/favorites');if(!d.posts||d.posts.length===0)document.getElementById('favoritesList').innerHTML='<div class="empty-state"><div class="empty-icon">⭐</div><p>还没有收藏</p></div>';else document.getElementById('favoritesList').innerHTML=d.posts.map(p=>'<div class="post-card" onclick="showDetail('+p.id+')"><div class="post-title">'+esc(p.title)+'</div><div class="post-meta"><span>👤 '+esc(p.nickname||'匿名')+'</span><span>🕐 '+timeAgo(p.created_at)+'</span></div></div>').join('')}catch(e){document.getElementById('favoritesList').innerHTML='<div class="empty-state"><div class="empty-icon">😢</div><p>加载失败</p></div>'}}
loadStats();fetchUser();loadPosts();
</script>
</body>
